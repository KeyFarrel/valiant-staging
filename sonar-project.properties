sonar.sources=src
sonar.tests=src/__test__/unit
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/src/plugins/**
sonar.coverage.exclusions=**/*.test.ts
sonar.projectKey=valiant-frontend
sonar.qualitygate.wait=true
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.junit.reportPaths=./reports/junit