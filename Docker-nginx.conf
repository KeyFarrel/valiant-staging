server {
    listen 80;
    server_name localhost;

    server_tokens off;

    root /usr/share/nginx/html;
    index index.html index.htm;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    location /assets/ {
        autoindex off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    location /wasm/ {
        if ($request_uri ~* "^/wasm/.*%3f") {
            return 400;
        }

        try_files $uri =404;

        etag off;

        types {
            application/wasm wasm;
        }

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, private" always;
        add_header Surrogate-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
