# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost;

    # Hide nginx version to fix "Known Technology Fingerprint"
    server_tokens off;

    return 301 https://$host$request_uri;
}

# HTTPS server with hardened SSL/TLS configuration
# Fixes: Insecure Transport: Weak SSL Cipher (CWE-326, CWE-327)
server {
    listen 443 ssl;
    server_name localhost;

    # Hide nginx version to fix "Known Technology Fingerprint"
    server_tokens off;

    # SSL certificate paths — mount these files at runtime via Docker volume or Kubernetes secret.
    # NOTE: Nginx will refuse to start if these files are missing.
    # Example: docker run -v /path/to/certs:/etc/nginx/ssl:ro ...
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Only allow TLS 1.2 and 1.3 — disables SSLv2, SSLv3, TLSv1.0, TLSv1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites only (Mozilla Intermediate Configuration)
    # Excludes NULL, RC4, 3DES/DES, EXPORT, aNULL, MD5, and other weak ciphers
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

    # Let the client decide cipher order (recommended for TLS 1.3 compatibility)
    ssl_prefer_server_ciphers off;

    # SSL session settings — improves handshake performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — faster certificate validation without third-party round-trip
    ssl_stapling on;
    ssl_stapling_verify on;
    # Use the container's default DNS resolver (Docker internal: 127.0.0.11)
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Security Headers (applied globally)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache control for HTML files - fix "Cache Management: Insecure Policy"
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Serve static files with proper caching and headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Protect assets directory from listing - fix "Unprotected Directory"
    location /assets/ {
        autoindex off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # WASM files specific handling with correct MIME type
    location /wasm/ {
        types {
            application/wasm wasm;
        }
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
