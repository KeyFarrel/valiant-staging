server {
    listen 80;
    server_name localhost;

    # Hide nginx version to fix "Known Technology Fingerprint"
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # NOTE: nginx does NOT inherit add_header directives from a parent block
    # into a child location block that defines its own add_header directives.
    # Therefore all security headers must be repeated in every location block
    # that has its own add_header entries (CWE-319 fix).

    location / {
        try_files $uri $uri/ /index.html;

        # Security headers — must be present in every location block (nginx inheritance rule)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        # Cache control for HTML files — fix "Cache Management: Insecure Policy"
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Serve static files with proper caching and headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;

        # Security headers — must be present in every location block (nginx inheritance rule)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
    }

    # Protect assets directory from listing — fix "Unprotected Directory"
    location /assets/ {
        autoindex off;

        # Security headers — must be present in every location block (nginx inheritance rule)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    }

    # WASM files — correct MIME type and security headers
    # Cache-Control: no-store prevents sensitive WASM binary from being stored
    # in browser or proxy caches (CWE-525)
    location /wasm/ {
        types {
            application/wasm wasm;
        }

        # Security headers — must be present in every location block (nginx inheritance rule)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://stg-portalvaliant.pln.co.id https://stg-be-valiant.pln.co.id wss:; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
