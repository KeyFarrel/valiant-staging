stages:
  - compile
  - build-images-docker
  - deploy-docker

variables:
  FROM_IMAGES: $CI_REGISTRY/jenkins.repo/baseimage/nginx:1.22.1-alpine3.16.4
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/$CI_COMMIT_BRANCH
  GIT_DEPTH: 0

Compile NPM:
  stage: compile
  image: node:latest
  cache:
    paths:
    - node_modules/
  before_script:
  - npm set registry=https://registry.npmjs.org/
  script:
  - npm config set legacy-peer-deps true
  - npm cache clean --force
  - npm install --unsafe-perm
  - npm run build
  artifacts:
    name: $CI_PROJECT_NAME-$CI_COMMIT_REF_NAME
    paths:
    - dist/
    expire_in: 1 hour
  only:
  - main
  - dev
  - staging  
  tags:
    - gitlab-runner-ep

Build Images Docker:
  stage: build-images-docker
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker pull $FROM_IMAGES
    - docker build --no-cache --build-arg gitlab=${FROM_IMAGES} --build-arg env=${CI_COMMIT_BRANCH} --build-arg project=${CI_PROJECT_NAME} -t $DOCKER_IMAGE . 
    - docker push $DOCKER_IMAGE
    - docker image rm $DOCKER_IMAGE
  only:
    - main
    - dev
    - staging
  tags:
    - gitlab-runner-ep

Deploy Docker:
  stage: deploy-docker
  script:
    - kubectl rollout restart deployment $CI_COMMIT_BRANCH-$CI_PROJECT_NAME;exit;
  only:
    - main
    - dev
    - staging
  tags:
    - gitlab-runner-ep
