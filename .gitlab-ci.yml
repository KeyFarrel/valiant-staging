stages:
  - create-env
  - build-app
  - unit-test
  - sast
  - build-image
  - update-tag-stag
  - approval
  - update-tag-prod

variables:
  IMAGE_NAME: "valiant/valiant-frontend"
  STAGING_VERSION: "build-$CI_COMMIT_SHORT_SHA"

# Caching Build
.npm-cache:
  image: harbor.pln.co.id/library/node:18.17.0-alpine
  cache:  # Cache modules in between jobs
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .npm/
      - node_modules/
  before_script:
    - npm install --cache .npm --prefer-offline

prepare_env_file_stg:
  stage: create-env
  image: harbor.pln.co.id/library/hashicorp/vault:1.13.1
  script:
    # Masuk ke Vault untuk autentikasi
    - echo "Authenticating to Vault..."
    - export VAULT_ADDR=$VAULT_ADDR
    - vault login -method=userpass username="$VAULT_USERNAME" password="$VAULT_PASSWORD"
    
    # Mengambil data dari Vault dan menyimpannya ke file .env
    - echo "Fetching secrets from Vault..."
    - vault kv get -mount="kv-valiant" "stg-valiant-frontend" > kv.secret
    - awk '/====== Data ======/{flag=1; next} /======/{flag=0} flag && $1 !~ /---/ && $1 != "" {print $1 "=" $2}' kv.secret > .env.staging
  artifacts:
    paths:
      - .env.staging
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_PIPELINE_SOURCE == "push"'
      when: always

prepare_env_file_prod:
  stage: create-env
  image: harbor.pln.co.id/library/hashicorp/vault:1.13.1
  script:
    # Masuk ke Vault untuk autentikasi
    - echo "Authenticating to Vault..."
    - export VAULT_ADDR=$VAULT_ADDR
    - vault login -method=userpass username="$VAULT_USERNAME" password="$VAULT_PASSWORD"
    
    # Mengambil data dari Vault dan menyimpannya ke file .env
    - echo "Fetching secrets from Vault..."
    - vault kv get -mount="kv-valiant" "prod-valiant-frontend" > kv.secret
    - awk '/====== Data ======/{flag=1; next} /======/{flag=0} flag && $1 !~ /---/ && $1 != "" {print $1 "=" $2}' kv.secret > .env.production
  artifacts:
    paths:
      - .env.production
  rules:
    - if: '$CI_COMMIT_TAG != null'
      when: always

build-app:
  extends: .npm-cache
  stage: build-app
  script:
    - npm run build
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_TAG == null'
      when: always
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_TAG == null'
      when: always


unit-test:
  extends: .npm-cache
  stage: unit-test
  before_script:
    - npm install -g jest
    - npm install --save-dev jest-junit
    - npm install ts-node --save-dev
    - npm install ts-jest typescript --save-dev
  script:
    - ./node_modules/.bin/jest --coverage
  allow_failure: true
  artifacts:
    when: always
    paths:
      - coverage/
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_TAG == null'
      when: always
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_TAG == null'
      when: always

sonarqube-check:
  stage: sast
  image:
    name: harbor.pln.co.id/library/sonarqube-scanner:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" == "dev" ]; then
        SONAR_BRANCH="dev"
      elif [ "$CI_COMMIT_BRANCH" == "staging" ]; then
        SONAR_BRANCH="staging"
      else
        SONAR_BRANCH="$CI_COMMIT_BRANCH"
      fi
      sonar-scanner
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_TAG == null'
      when: always
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_COMMIT_TAG == null'
      when: always
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^feature\/.*$/ && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" && $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\/.*$/ && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "staging" && $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

build-image:
  image: 
    name: harbor.pln.co.id/library/docker:24.0.7
  stage: build-image
  services:
    - harbor.pln.co.id/library/docker:24.0.7-dind
  variables:
    DOCKER_HOST: "tcp://localhost:2375"
  before_script:
    - update-ca-certificates
    - export IMAGE_FULL=$HARBOR_REGISTRY/$IMAGE_NAME:$STAGING_VERSION
    - if [[ $CI_COMMIT_TAG != '' ]]; then export IMAGE_FULL=$HARBOR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_TAG; fi;
  script:
    - docker login -u $HARBOR_REGISTRY_USERNAME -p $HARBOR_REGISTRY_PASSWORD $HARBOR_REGISTRY
    - echo "Building Image $IMAGE_FULL"
    - docker build -t $IMAGE_FULL .
    - docker push $IMAGE_FULL
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_COMMIT_TAG != null'
      when: always

deploy-stag:
  image:
    name : harbor.pln.co.id/library/alpine:git
    entrypoint : [""]
  stage: update-tag-stag
  before_script:
    - git config --global user.name "Gitlab PLN CI/CD"
    - git config --global user.email "gitlab@pln.co.id"
    - git config --global http.sslVerify false
  script:
    - echo "Updating Deployment Repository with tag $STAGING_VERSION"
    - git clone $DEPLOYMENT_REPOSITORY .manifest
    - cd .manifest/environments
    - |
      frontend_tag=$(cat values-stag.yaml | grep -m 1 frontendTag: | awk '{print $2}')
    - |
      version=$(cat values-stag.yaml | grep -m 1 version: | awk '{print $2}')
    - |
      sed -i "s/frontendTag: $frontend_tag/frontendTag: $STAGING_VERSION/g" values-stag.yaml
    - |
      sed -i "s/version: $version/version: $STAGING_VERSION/g" values-stag.yaml
    - git commit -am "Update Deployment Image Version to version $STAGING_VERSION" && git push origin master
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging" && $CI_PIPELINE_SOURCE == "push"'
      when: always

send-approval-notif:
  stage: approval
  image:
    name: harbor.pln.co.id/library/email-service:latest
    entrypoint: [""]
  script:
    - cd /app
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_1_EMAIL --subject "CI/CD Deployment Need Approval"
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_2_EMAIL --subject "CI/CD Deployment Need Approval"
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_3_EMAIL --subject "CI/CD Deployment Need Approval"
  rules:
    - if: '$CI_COMMIT_TAG =~ /.*-release$/'
      when: always

approval_project_manager:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_1_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  # when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /.*-release$/'
      when: manual

approval_security_engineer:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_2_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  # when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /.*-release$/'
      when: manual

approval_sre:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_3_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  # when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /.*-release$/'
      when: manual

deploy-prod:
  image:
    name : harbor.pln.co.id/library/alpine:git
    entrypoint : [""]
  stage: update-tag-prod
  needs:
   - approval_project_manager
   - approval_security_engineer
   - approval_sre
  dependencies: []
  before_script:
    - git config --global user.name "Gitlab Btech CI/CD"
    - git config --global user.email "gitlab@gitlab.btech-sd.id"
    - git config --global http.sslVerify false
  script:
    - echo "Updating Production Repository with tag $CI_COMMIT_TAG"
    - git clone $DEPLOYMENT_REPOSITORY .manifest
    - cd .manifest/environments
    - git checkout production
    - |
      frontend_tag=$(cat values-prod.yaml | grep -m 1 frontendTag: | awk '{print $2}')
    - |
      version=$(cat values-prod.yaml | grep -m 1 version: | awk '{print $2}')
    - |
      sed -i "s/frontendTag: $frontend_tag/frontendTag: $CI_COMMIT_TAG/g" values-prod.yaml
    - |
      sed -i "s/version: $version/version: $CI_COMMIT_TAG/g" values-prod.yaml
    - git commit -am "Update Production Image Version to version $CI_COMMIT_TAG" && git push origin production
  rules:
    - if: '$CI_COMMIT_TAG =~ /.*-release$/'
      when: always
      