stages:
  - build-app
  - unit-test
  - sast
  - build-image
  - update-tag-dev
  - approval
  - update-tag-prod

variables:
  IMAGE_NAME: "valiant/valiant-frontend"
  STAGING_VERSION: "build-$CI_COMMIT_SHORT_SHA"

# Caching Build
.npm-cache:
  image: node:18.14.2-alpine
  cache:  # Cache modules in between jobs
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

build-app:
  extends: .npm-cache
  stage: build-app
  script:
    - npm run build
  only:
    - merge_requests
    - dev
    - /^*-release$/

unit-test:
  extends: .npm-cache
  stage: unit-test
  before_script:
    - npm install -g jest
    - npm install --save-dev jest-junit
  script:
    - jest --ci --reporters=default --reporters=jest-junit
  allow_failure: true
  artifacts:
    when: always
    reports:
      junit:
        - junit.xml
  only:
    - merge_requests
    - dev

sonarqube-check:
  stage: sast
  image: 
    name: harbor.pln.co.id/library/sonarqube-scanner:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner
  allow_failure: true
  only:
    - dev 

build-image:
  image: 
    name: docker:24.0.7
  stage: build-image
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: "tcp://localhost:2375"
  before_script:
    - update-ca-certificates
    - export IMAGE_FULL=$HARBOR_REGISTRY/$IMAGE_NAME:$STAGING_VERSION
    - if [[ $CI_COMMIT_TAG != '' ]]; then export IMAGE_FULL=$HARBOR_REGISTRY/$IMAGE_NAME:$CI_COMMIT_TAG; fi;
  script:
    - docker login -u $HARBOR_REGISTRY_USERNAME -p $HARBOR_REGISTRY_PASSWORD $HARBOR_REGISTRY
    - echo "Building Image $IMAGE_FULL"
    - docker build -t $IMAGE_FULL .
    - docker push $IMAGE_FULL
  only:
    - dev
    - /^*-release$/

deploy-dev:
  image:
    name : alpine/git
    entrypoint : [""]
  stage: update-tag-dev
  before_script:
    - git config --global user.name "Gitlab PLN CI/CD"
    - git config --global user.email "gitlab@pln.co.id"
    - git config --global http.sslVerify false
  script:
    - echo "Updating Deployment Repository with tag $STAGING_VERSION"
    - git clone $DEPLOYMENT_REPOSITORY .manifest
    - cd .manifest/environments
    - |
      tag=$(cat values-dev.yaml | grep -m 1 frontendTag: | awk '{print $2}')
    - |
      version=$(cat values-dev.yaml | grep -m 1 version: | awk '{print $2}')
    - sed -i "s/$tag/$STAGING_VERSION/g" values-dev.yaml
    - sed -i "s/$version/$STAGING_VERSION/g" values-dev.yaml
    - git commit -am "Update Deployment Image Version to version $STAGING_VERSION" && git push origin dev
  only:
    - dev

send-approval-notif:
  stage: approval
  image:
    name: harbor.pln.co.id/library/email-service:latest
    entrypoint: [""]
  script:
    - cd /app
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_1_EMAIL --subject "CI/CD Deployment Need Approval"
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_2_EMAIL --subject "CI/CD Deployment Need Approval"
    - python ./email_sender.py --template approval.html --from $MAIL_FROM_ADDRESS --to $APPROVAL_3_EMAIL --subject "CI/CD Deployment Need Approval"
  only:
    - /^*-release$/

approval_1:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_1_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  when: manual
  allow_failure: false
  only: 
    - /^*-release$/

approval_2:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_2_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  when: manual
  allow_failure: false
  only: 
    - /^*-release$/

approval_3:
  stage: approval
  dependencies: []
  script:
    - if [[ "$GITLAB_USER_EMAIL" == "$APPROVAL_3_EMAIL" ]]; then
        echo "User has permission to run the job.";
      else
        echo "User does not have permission to run the job. Aborting...";
        exit 1;
      fi;
  when: manual
  allow_failure: false
  only: 
    - /^*-release$/

deploy-prod:
  image:
    name : alpine/git
    entrypoint : [""]
  stage: update-tag-prod
  needs:
   - approval_1
   - approval_2
   - approval_3 
  dependencies: []
  before_script:
    - git config --global user.name "Gitlab Btech CI/CD"
    - git config --global user.email "gitlab@gitlab.btech-sd.id"
    - git config --global http.sslVerify false
  script:
    - echo "Updating Production Repository with tag $CI_COMMIT_TAG"
    - git clone $DEPLOYMENT_REPOSITORY .manifest
    - cd .manifest/environments
    - |
      tag=$(cat values-prod.yaml | grep -m 1 tag: | awk '{print $2}')
    - |
      version=$(cat values-prod.yaml | grep -m 1 version: | awk '{print $2}')
    - sed -i "s/$tag/$CI_COMMIT_TAG/g" values-prod.yaml
    - sed -i "s/$version/$CI_COMMIT_TAG/g" values-prod.yaml
    - git commit -am "Update Production Image Version to version $CI_COMMIT_TAG" && git push origin dev
  only:
    - /^*-release$/
